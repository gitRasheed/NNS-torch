name: CI

on:
  push:
  pull_request:

jobs:
  cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Validate
        run: scripts/run_cpu_validation.sh
